<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Music</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- section 1 navbar -->
    <nav>
        <ul>
            <li class="brand"> <img src="assets/logo.webp" alt="Spotify" height="200">Spotify</li>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <!-- section 2 main content -->
    <div class="container">
        <div class="songlist">
            <h1>Songs</h1>
            <div>
                <div class="songitem">
                    <!-- song 1 -->
                    <img src="albumcover/wildflower-albumcover.jpg" alt="1">
                    <span class="songname">Wildflower - Billie Eilish</span>
                    <span class="songlistplay"><span class="timestamp">4:21</span><i class="fa-solid fa-play"></i></span>
                </div>

                <div class="songitem">
                    <!-- song 2 -->
                    <img src="albumcover/cry-albumcover.jpg" alt="2">
                    <span class="songname">Cry - Cigarettes After Sex</span>
                    <span class="songlistplay"><span class="timestamp">4:17</span><i class="fa-solid fa-play"></i></span>
                </div>

                <div class="songitem">
                    <!-- song 3 -->
                    <img src="albumcover/khat-albumcover.jpeg" alt="3">
                    <span class="songname">Khat - Navjot Ahuja</span>
                    <span class="songlistplay"><span class="timestamp">4:56</span><i class="fa-solid fa-play"></i></span>
                </div>
            </div>
        </div>
        <div class="songbanner">
            <img id="bannercover" src="" alt="Album Art">
        </div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="myprogressbar" min="0" max="100">
        <div class="icons">
            <!-- fontawesome icons -->
            <i class="fa-solid fa-2x fa-backward-step" id="prev"></i>
            <i class="fa-solid fa-2x fa-play" id="masterplay"></i>
            <i class="fa-solid fa-2x fa-forward-step" id="next"></i>
        </div>
        <div class="songinfo">
            <img id="songcover" src="" alt="">
            <span id="songinfo-name"></span>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/7559a82a4f.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
